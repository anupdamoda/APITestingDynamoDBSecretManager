version: 0.2

phases:

  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_URI=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_URI

  build:
    commands:
      - echo "Building Docker image..."

      - docker build -t $ECR_REPOSITORY:latest .

      - docker tag $ECR_REPOSITORY:latest $ECR_URI/$ECR_REPOSITORY:latest

      - docker push $ECR_URI/$ECR_REPOSITORY:latest

  post_build:
    commands:

      - echo "Starting ECS Task..."

      - TASK_ARN=$(aws ecs run-task --cluster $ECS_CLUSTER --launch-type FARGATE --task-definition $ECS_TASK_DEFINITION --network-configuration "awsvpcConfiguration={subnets=[$ECS_SUBNET],securityGroups=[$ECS_SECURITY_GROUP],assignPublicIp=ENABLED}" --query "tasks[0].taskArn" --output text)

      - if [ "$TASK_ARN" = "None" ] || [ -z "$TASK_ARN" ]; then echo "Failed to start ECS Task"; exit 1; fi

      - echo "Waiting for ECS task to finish..."

      - aws ecs wait tasks-stopped --cluster $ECS_CLUSTER --tasks $TASK_ARN

      - EXIT_CODE=$(aws ecs describe-tasks --cluster $ECS_CLUSTER --tasks $TASK_ARN --query "tasks[0].containers[0].exitCode" --output text)