base.url=https://c0bd29gtl5.execute-api.us-east-1.amazonaws.com

# Pre-registered test user used by the login-each-run auth flow.
# Override at runtime with -Dtest.user.password=... or env TEST_USER_PASSWORD=...
test.user.email=Xxx  // This is now coming from secrets manager, so we can leave it as a placeholder here.
test.user.password=xxx  // This is now coming from secrets manager, so we can leave it as a placeholder here.

# A password that is NOT the test user's password — used for negative-auth scenarios.
test.user.invalid.password=Password123

aws.region=ap-southeast-2
aws.roleArn=arn:aws:iam::202197228550:role/AWSAutomationTester
aws.profile=tester


